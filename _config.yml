title: "CDC RSS Feed"
public-url: "https://www.kcc.edu"
port: 3000
timezone: America/Chicago
baseurl: '/'
permalink: pretty
description: > # this means to ignore newlines until "baseurl:"
# Delete this comment and place description on this line
# include:
#   - "_pages"
#   - "_posts"

# include future posts? (true or false)
future: true
# Build settings
markdown: kramdown

exclude:
  - "node_modules"
  - "npm-debug.log"
  - "package.json"
  - "package-lock.json"
  - "README.md"
  - "Gemfile"
  - "Gemfile.lock"
  - "/docs/"
  - "webpack.config.js"
  - "siteicon.png"
  - "buildtools/"
  - "postcss.config.js"
